<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Zeez | Education with Zeez 143</title>
    <!-- Premium Fonts Framework -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* Shared Platform Tokens */
        :root {
            --bg-body: #f8fafc;
            --bg-surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --radius-lg: 16px;
            --radius-full: 9999px;
            --shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.05), 0 8px 10px -6px rgba(15, 23, 42, 0.05);
            --transition-bounce: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }

        /* Professional Card Frame */
        .contact-card {
            background: var(--bg-surface);
            max-width: 340px;
            width: 100%;
            padding: 35px 30px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            text-align: center;
            transition: var(--transition-bounce);
        }

        .contact-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 25px -5px rgba(15, 23, 42, 0.08);
        }

        /* Icon Framework */
        .insta-logo-container {
            width: 70px;
            height: 70px;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-bounce);
        }

        .contact-card:hover .insta-logo-container {
            transform: scale(1.1) rotate(5deg);
        }

        .insta-logo-svg {
            width: 100%;
            height: 100%;
        }

        /* Identity Typography */
        .insta-id {
            display: block;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .insta-subtitle {
            display: block;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 25px;
        }

        /* Premium Brand CTA Button Layout */
        .insta-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            box-sizing: border-box;
            padding: 14px 30px;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white;
            text-decoration: none;
            border-radius: var(--radius-full);
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: -0.2px;
            transition: var(--transition-bounce);
            border: none;
            box-shadow: 0 4px 14px rgba(220, 39, 67, 0.25);
        }

        .insta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(220, 39, 67, 0.4);
            color: white;
        }

        .insta-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

<div class="contact-card">
